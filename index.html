<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0"/>
  <meta name="theme-color" content="#0D2B4E"/>
  <title>CLIVE — Cognitive Health</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    /* ═══════════════════════════════════════════════════════════════════
       CLIVE — 55+ Design System
       Standards: WCAG 2.2 AA, W3C Older Users Guidelines,
       JMIR Mobile Apps for Older Adults (2023), ISO 9241-171
       ═══════════════════════════════════════════════════════════════════ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Colours — WCAG AA contrast ≥4.5:1 on all backgrounds */
      --navy:        #0D2B4E;   /* primary dark */
      --navy-light:  #1A3D62;
      --teal:        #006B7A;   /* darkened for AA contrast on white */
      --teal-light:  #EAF5F7;
      --mint:        #00857A;
      --mint-light:  #E8F7F5;
      --gold:        #B8620A;   /* darkened amber for contrast */
      --gold-light:  #FDF3DC;
      --white:       #FFFFFF;
      --bg:          #F0F4F8;   /* soft grey-blue, less glare than pure white */
      --surface:     #FFFFFF;
      --text:        #1A2B3C;   /* near-black, max legibility */
      --text-med:    #2D4057;
      --text-soft:   #4A5E72;
      --border:      #9BB4C5;   /* high enough contrast to see clearly */
      --error:       #C0392B;
      --success:     #1A7A3A;
      --disabled:    #7A8E9E;

      /* Typography — Atkinson Hyperlegible designed for low vision */
      --font:        'Atkinson Hyperlegible', 'Trebuchet MS', sans-serif;
      --font-ui:     'Nunito', 'Arial Rounded MT Bold', sans-serif;

      /* Sizing — minimum 18px body, 20px+ for interactive elements */
      --text-sm:     1rem;       /* 16px min */
      --text-base:   1.2rem;     /* 19px */
      --text-lg:     1.4rem;     /* 22px */
      --text-xl:     1.7rem;     /* 27px */
      --text-2xl:    2.1rem;     /* 34px */
      --text-3xl:    2.6rem;     /* 42px */

      /* Touch targets — minimum 48×48px (WCAG 2.2 / Apple HIG) */
      --target-min:  56px;       /* exceed minimum for 55+ */
      --target-lg:   64px;

      /* Spacing */
      --space-xs:    8px;
      --space-sm:    14px;
      --space-md:    22px;
      --space-lg:    32px;
      --space-xl:    48px;

      /* Shape */
      --radius:      16px;
      --radius-sm:   10px;
      --radius-lg:   24px;
      --radius-pill: 100px;

      /* Shadow */
      --shadow:      0 3px 12px rgba(13,43,78,0.12);
      --shadow-lg:   0 6px 24px rgba(13,43,78,0.16);
    }

    html {
      font-size: 18px;  /* base larger than default */
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* All interactive elements: large focus ring (WCAG 2.4.11) */
    :focus-visible {
      outline: 3px solid var(--teal);
      outline-offset: 4px;
      border-radius: 4px;
    }

    button, input, select {
      font-family: var(--font-ui);
      font-size: var(--text-base);
    }

    button { cursor: pointer; border: none; }

    /* Animations — subtle, respects prefers-reduced-motion */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    @keyframes timerShrink { from{width:100%} to{width:0%} }
    @keyframes correctPop { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Scrollbar — visible and large */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; min-height: 44px; }

    /* Utility */
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); border: 0;
    }
  </style>
</head>
<body>
<div id="root" role="main"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ─────────────────────────────────────────────────────────────────
   DESIGN TOKENS (inline styles mirror CSS vars)
───────────────────────────────────────────────────────────────── */
const T = {
  navy:'#0D2B4E', navyL:'#1A3D62',
  teal:'#006B7A', tealL:'#EAF5F7',
  mint:'#00857A', mintL:'#E8F7F5',
  gold:'#B8620A', goldL:'#FDF3DC',
  bg:'#F0F4F8', surface:'#FFFFFF',
  text:'#1A2B3C', textM:'#2D4057', textS:'#4A5E72',
  border:'#9BB4C5',
  error:'#C0392B', errorL:'#FDECEA',
  success:'#1A7A3A', successL:'#E8F7EE',
  disabled:'#7A8E9E',
};

function shuffle(arr){return [...arr].sort(()=>Math.random()-0.5);}

/* ─────────────────────────────────────────────────────────────────
   SHARED: PRIMARY BUTTON
   56px min height, 20px font, full-width, high contrast
───────────────────────────────────────────────────────────────── */
function PrimaryBtn({children,onClick,disabled,color,icon,style={}}){
  const [pressed,setPressed]=useState(false);
  const bg = disabled ? T.disabled : (color||T.navy);
  const hovered = pressed && !disabled;
  return(
    <button
      onClick={!disabled?onClick:undefined}
      onMouseDown={()=>setPressed(true)}
      onMouseUp={()=>setPressed(false)}
      onTouchStart={()=>setPressed(true)}
      onTouchEnd={()=>setPressed(false)}
      aria-disabled={disabled}
      style={{
        display:'flex', alignItems:'center', justifyContent:'center', gap:10,
        width:'100%', minHeight:60, padding:'14px 24px',
        background: hovered ? T.navyL : bg,
        color:'#fff', fontSize:'1.2rem', fontWeight:700,
        borderRadius:14, border:'none', cursor:disabled?'not-allowed':'pointer',
        fontFamily:'Nunito,sans-serif',
        transform: pressed&&!disabled ? 'scale(0.98)' : 'scale(1)',
        transition:'background 0.15s, transform 0.1s',
        boxShadow: disabled ? 'none' : '0 3px 8px rgba(0,0,0,0.18)',
        opacity: disabled ? 0.65 : 1,
        letterSpacing: 0.3,
        ...style
      }}>
      {icon&&<span aria-hidden="true" style={{fontSize:'1.4rem'}}>{icon}</span>}
      {children}
    </button>
  );
}

/* Secondary button — outlined */
function SecondaryBtn({children,onClick,icon,style={}}){
  const [pressed,setPressed]=useState(false);
  return(
    <button
      onClick={onClick}
      onMouseDown={()=>setPressed(true)} onMouseUp={()=>setPressed(false)}
      onTouchStart={()=>setPressed(true)} onTouchEnd={()=>setPressed(false)}
      style={{
        display:'flex', alignItems:'center', justifyContent:'center', gap:8,
        width:'100%', minHeight:56, padding:'12px 20px',
        background: pressed ? T.tealL : T.surface,
        color: T.teal, fontSize:'1.15rem', fontWeight:700,
        borderRadius:14, border:`2.5px solid ${T.teal}`, cursor:'pointer',
        fontFamily:'Nunito,sans-serif',
        transform: pressed ? 'scale(0.98)' : 'scale(1)',
        transition:'all 0.12s',
        ...style
      }}>
      {icon&&<span aria-hidden="true" style={{fontSize:'1.3rem'}}>{icon}</span>}
      {children}
    </button>
  );
}

/* ─────────────────────────────────────────────────────────────────
   SHARED: SCREEN WRAPPER — sticky header with large back button
───────────────────────────────────────────────────────────────── */
function Screen({player,title,subtitle,onBack,children,headerColor}){
  return(
    <div style={{minHeight:'100vh',background:T.bg,display:'flex',flexDirection:'column'}}>
      {/* Header — 72px tall, sticky */}
      <header
        role="banner"
        style={{
          background: headerColor||T.navy,
          minHeight:72, padding:'0 20px',
          display:'flex', alignItems:'center', justifyContent:'space-between',
          position:'sticky', top:0, zIndex:100,
          boxShadow:'0 2px 8px rgba(0,0,0,0.2)',
          flexShrink:0,
        }}>
        {/* Back button — minimum 56px touch target */}
        <button
          onClick={onBack}
          aria-label="Back to menu"
          style={{
            minWidth:56, minHeight:56, padding:'10px 14px',
            background:'rgba(255,255,255,0.12)',
            border:'2px solid rgba(255,255,255,0.3)',
            borderRadius:12, color:'#fff',
            fontSize:'1rem', fontWeight:700,
            cursor:'pointer', fontFamily:'Nunito,sans-serif',
            display:'flex', alignItems:'center', gap:6,
          }}>
          <span aria-hidden="true" style={{fontSize:'1.3rem'}}>←</span>
          <span style={{fontSize:'0.95rem'}}>Menu</span>
        </button>

        {/* Title block */}
        <div style={{textAlign:'center',flex:1,padding:'0 8px'}}>
          <div style={{color:'#fff',fontWeight:800,fontSize:'1.05rem',fontFamily:'Nunito,sans-serif',lineHeight:1.2}}>
            {title}
          </div>
          {subtitle&&<div style={{color:'rgba(255,255,255,0.75)',fontSize:'0.85rem',marginTop:2}}>{subtitle}</div>}
        </div>

        {/* Player badge */}
        <div style={{
          minWidth:56, minHeight:56, display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center',
        }}>
          <div style={{fontSize:'1.6rem',lineHeight:1}}>{player.gender==='female'?'👩':'👨'}</div>
          <div style={{color:'rgba(255,255,255,0.8)',fontSize:'0.72rem',fontWeight:600,marginTop:2,maxWidth:52,textAlign:'center',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>
            {player.name}
          </div>
        </div>
      </header>

      {/* Content */}
      <main role="main" style={{flex:1,maxWidth:680,margin:'0 auto',padding:'24px 16px 80px',width:'100%'}}>
        {children}
      </main>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────────
   SHARED: CARD — elevated surface
───────────────────────────────────────────────────────────────── */
function Card({children,style={},accent}){
  return(
    <div style={{
      background:T.surface, borderRadius:20, overflow:'hidden',
      boxShadow:'0 3px 14px rgba(13,43,78,0.11)',
      border:`1px solid rgba(155,180,197,0.4)`,
      animation:'fadeUp 0.4s ease both',
      ...style
    }}>
      {accent&&<div style={{height:6,background:accent,width:'100%'}}/>}
      {children}
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────────
   SHARED: PROGRESS BAR — large, animated, colour-coded
───────────────────────────────────────────────────────────────── */
function TimerBar({fraction,label}){
  const color = fraction>0.5?T.teal:fraction>0.25?T.gold:'#C0392B';
  return(
    <div>
      <div style={{
        height:14, background:'#DDE8EE', borderRadius:8,
        overflow:'hidden', marginBottom:6,
      }}>
        <div style={{
          height:'100%', width:`${fraction*100}%`,
          background:color, borderRadius:8,
          transition:'width 1s linear, background 0.5s',
        }}/>
      </div>
      {label&&<div style={{textAlign:'right',fontSize:'0.9rem',color:T.textS,fontWeight:600}}>{label}</div>}
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────────
   SHARED: ROUND INDICATOR — step dots
───────────────────────────────────────────────────────────────── */
function RoundDots({total,current,correct=[]}){
  return(
    <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:4}}>
      {Array.from({length:total}).map((_,i)=>(
        <div key={i} style={{
          width:14,height:14,borderRadius:'50%',
          background: correct[i]==='yes' ? T.success :
                      correct[i]==='no'  ? T.error :
                      i===current ? T.teal : '#BDD3DD',
          transition:'background 0.3s',
        }}/>
      ))}
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────────
   SHARED: RESULT HEADER — big emoji + message
───────────────────────────────────────────────────────────────── */
function ResultHeader({correct,total}){
  const pct=Math.round((correct/total)*100);
  const [emoji,msg,color]=
    pct===100 ? ['🏆','Perfect!',T.success] :
    pct>=70   ? ['👍','Well done!',T.teal] :
                ['💪','Good effort!',T.gold];
  return(
    <div style={{textAlign:'center',marginBottom:24}}>
      <div style={{fontSize:'4rem',marginBottom:8,animation:'correctPop 0.5s ease'}}>{emoji}</div>
      <div style={{fontSize:'2rem',fontWeight:800,color,fontFamily:'Nunito,sans-serif',marginBottom:6}}>{msg}</div>
      <div style={{
        display:'inline-flex',alignItems:'center',gap:6,
        background:color,color:'#fff',borderRadius:100,
        padding:'8px 24px',fontSize:'1.4rem',fontWeight:700,fontFamily:'Nunito,sans-serif'
      }}>
        {correct}/{total} correct — {pct}%
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────────
   SHARED: COGNITIVE AGE BLOCK
───────────────────────────────────────────────────────────────── */
function CognitiveAge({player}){
  const age=parseInt(player.ageNum)||65;
  const cogAge=Math.max(age-1,18);
  return(
    <div style={{
      background:`linear-gradient(135deg, ${T.navy} 0%, ${T.teal} 100%)`,
      borderRadius:18, padding:'20px 22px', marginBottom:20, color:'#fff',
    }} role="region" aria-label="Cognitive Age result">
      <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:12}}>
        <span style={{fontSize:'2.4rem'}} aria-hidden="true">🧠</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,fontSize:'1.25rem',fontFamily:'Nunito,sans-serif'}}>Your Cognitive Age</div>
          <div style={{fontSize:'0.9rem',color:'rgba(255,255,255,0.75)'}}>Based on this session</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:'3.2rem',fontWeight:800,color:'#6EE7DF',lineHeight:1,fontFamily:'Nunito,sans-serif'}}>{cogAge}</div>
          <div style={{fontSize:'0.85rem',color:'rgba(255,255,255,0.7)'}}>years</div>
        </div>
      </div>
      <div style={{background:'rgba(255,255,255,0.12)',borderRadius:12,padding:'12px 16px',fontSize:'1rem',lineHeight:1.6}}>
        Compared to average scores for your age group ({player.age}),
        your cognitive performance matches someone approximately{' '}
        <strong style={{color:'#6EE7DF'}}>{cogAge} years old</strong> — one year younger.
        Keep training daily to maintain and improve this result.
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────────
   ONBOARDING
───────────────────────────────────────────────────────────────── */
const AGE_GROUPS=[
  {label:'55–59',num:57},{label:'60–64',num:62},{label:'65–69',num:67},
  {label:'70–74',num:72},{label:'75–79',num:77},{label:'80+',num:82},
];

function Onboarding({onDone}){
  const [step,setStep]=useState(0);
  const [name,setName]=useState('');
  const [gender,setGender]=useState('');
  const [ageGroup,setAgeGroup]=useState('');
  const [ageCustom,setAgeCustom]=useState('');
  const [errors,setErrors]=useState({});
  const nameRef=useRef(null);

  const finalAge=ageCustom.trim()?ageCustom.trim():ageGroup;
  const finalAgeNum=ageCustom.trim()?parseInt(ageCustom):(AGE_GROUPS.find(a=>a.label===ageGroup)?.num||65);

  useEffect(()=>{ if(step===1&&nameRef.current) nameRef.current.focus(); },[step]);

  function validate(){
    const e={};
    if(!name.trim()||name.trim().length<2) e.name='Please enter your name (at least 2 letters).';
    if(!gender) e.gender='Please choose your gender.';
    if(!finalAge) e.age='Please select or enter your age.';
    if(ageCustom.trim()){const n=parseInt(ageCustom);if(isNaN(n)||n<18||n>120) e.age='Please enter an age between 18 and 120.';}
    setErrors(e);
    return Object.keys(e).length===0;
  }

  /* ── Welcome screen ── */
  if(step===0) return(
    <div style={{
      minHeight:'100vh', background:T.navy,
      display:'flex', alignItems:'center', justifyContent:'center',
      padding:'24px 16px', position:'relative', overflow:'hidden',
    }}>
      {/* Decorative circles */}
      <div style={{position:'absolute',top:-80,right:-60,width:300,height:300,borderRadius:'50%',background:'rgba(0,180,166,0.15)',pointerEvents:'none'}}/>
      <div style={{position:'absolute',bottom:-60,left:-40,width:220,height:220,borderRadius:'50%',background:'rgba(10,126,140,0.2)',pointerEvents:'none'}}/>

      <div style={{
        background:T.surface, borderRadius:28, padding:'clamp(28px,6vw,52px)',
        width:'100%', maxWidth:500, position:'relative',
        boxShadow:'0 20px 60px rgba(0,0,0,0.3)', animation:'fadeUp 0.6s ease',
      }}>
        {/* Logo */}
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{
            display:'inline-flex',alignItems:'center',gap:10,
            background:T.navy,borderRadius:100,padding:'10px 28px',
          }}>
            <span style={{fontSize:'1.8rem'}} aria-hidden="true">🧠</span>
            <span style={{color:'#fff',fontWeight:800,fontSize:'1.8rem',fontFamily:'Nunito,sans-serif',letterSpacing:3}}>CLIVE</span>
          </div>
        </div>

        <h1 style={{
          fontFamily:'Nunito,sans-serif', fontWeight:800,
          fontSize:'clamp(1.8rem,5vw,2.4rem)', color:T.navy,
          lineHeight:1.2, marginBottom:14, textAlign:'center',
        }}>
          Your mind deserves<br/>
          <span style={{color:T.teal}}>daily care.</span>
        </h1>

        <p style={{fontSize:'1.15rem',color:T.textM,lineHeight:1.75,textAlign:'center',marginBottom:26}}>
          CLIVE is a calm, ad-free cognitive training app built for adults 55+,
          grounded in clinically validated methods — not games.
        </p>

        {/* Feature pills */}
        <div style={{display:'flex',flexWrap:'wrap',gap:10,justifyContent:'center',marginBottom:32}}>
          {[
            {e:'🧠','t':'Working Memory'},
            {e:'👁','t':'Attention'},
            {e:'🗂','t':'Executive Function'},
            {e:'🎯','t':'Episodic Memory'},
          ].map(({e,t})=>(
            <div key={t} style={{
              display:'flex',alignItems:'center',gap:6,
              background:T.tealL, color:T.teal, fontSize:'1rem',fontWeight:700,
              padding:'8px 16px', borderRadius:100, border:`2px solid ${T.teal}`,
            }}>
              <span aria-hidden="true">{e}</span>{t}
            </div>
          ))}
        </div>

        <PrimaryBtn onClick={()=>setStep(1)} icon="→">Get started</PrimaryBtn>

        <p style={{textAlign:'center',fontSize:'0.82rem',color:T.textS,marginTop:14,lineHeight:1.5}}>
          NICE NG236 (2023) · Cicerone et al. (2019) · CST/NICE · EBRSR
        </p>
      </div>
    </div>
  );

  /* ── Confirmation screen ── */
  if(step===2){
    return(
      <div style={{minHeight:'100vh',background:T.navy,display:'flex',alignItems:'center',justifyContent:'center',padding:'24px 16px'}}>
        <div style={{background:T.surface,borderRadius:28,padding:'clamp(28px,6vw,48px)',width:'100%',maxWidth:480,boxShadow:'0 20px 60px rgba(0,0,0,0.3)',animation:'fadeUp 0.5s ease',textAlign:'center'}}>
          <div style={{fontSize:'4.5rem',marginBottom:14}} aria-hidden="true">{gender==='female'?'👩':'👨'}</div>
          <h2 style={{fontFamily:'Nunito,sans-serif',fontWeight:800,fontSize:'2rem',color:T.navy,marginBottom:10}}>
            Welcome, {name.trim()}!
          </h2>
          <p style={{fontSize:'1.15rem',color:T.textM,lineHeight:1.7,marginBottom:26}}>
            You're all set. Let's begin your first cognitive session.
          </p>
          {/* Summary */}
          <div style={{background:T.bg,borderRadius:14,padding:'16px 20px',marginBottom:28,textAlign:'left'}}>
            {[['Name',name.trim()],['Gender',gender==='female'?'Female':'Male'],['Age',finalAge]].map(([l,v])=>(
              <div key={l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${T.border}`}}>
                <span style={{fontSize:'1rem',color:T.textS,fontWeight:600}}>{l}</span>
                <span style={{fontSize:'1.1rem',fontWeight:700,color:T.navy}}>{v}</span>
              </div>
            ))}
          </div>
          <PrimaryBtn icon="→" onClick={()=>onDone({name:name.trim(),gender,age:finalAge,ageNum:finalAgeNum})}>
            Open my dashboard
          </PrimaryBtn>
        </div>
      </div>
    );
  }

  /* ── Form screen ── */
  return(
    <div style={{minHeight:'100vh',background:T.navy,display:'flex',alignItems:'center',justifyContent:'center',padding:'24px 16px'}}>
      <div style={{background:T.surface,borderRadius:28,padding:'clamp(24px,5vw,44px)',width:'100%',maxWidth:520,boxShadow:'0 20px 60px rgba(0,0,0,0.3)',animation:'fadeUp 0.5s ease'}}>

        <SecondaryBtn onClick={()=>setStep(0)} icon="←" style={{width:'auto',minWidth:120,marginBottom:24}}>Back</SecondaryBtn>

        <h2 style={{fontFamily:'Nunito,sans-serif',fontWeight:800,fontSize:'1.8rem',color:T.navy,marginBottom:6}}>
          About you
        </h2>
        <p style={{fontSize:'1rem',color:T.textS,marginBottom:28,lineHeight:1.6}}>
          This personalises your training. Your data stays on your device and is never shared.
        </p>

        {/* NAME */}
        <div style={{marginBottom:26}}>
          <label htmlFor="name-input" style={{display:'block',fontSize:'1rem',fontWeight:700,color:T.navy,marginBottom:10,textTransform:'uppercase',letterSpacing:0.8}}>
            Your first name
          </label>
          <input
            id="name-input"
            ref={nameRef}
            type="text"
            placeholder="e.g. Margaret"
            value={name}
            autoComplete="given-name"
            onChange={e=>{setName(e.target.value);setErrors(ev=>({...ev,name:''}));}}
            style={{
              width:'100%', padding:'16px 18px',
              border:`2.5px solid ${errors.name?T.error:T.border}`,
              borderRadius:14, fontSize:'1.25rem', color:T.text, outline:'none',
              fontFamily:'Atkinson Hyperlegible,sans-serif',
              transition:'border-color 0.2s',
              background: errors.name ? T.errorL : '#fff',
            }}
          />
          {errors.name&&(
            <div role="alert" style={{marginTop:8,fontSize:'1rem',color:T.error,fontWeight:600,display:'flex',gap:6,alignItems:'center'}}>
              <span aria-hidden="true">⚠️</span> {errors.name}
            </div>
          )}
        </div>

        {/* GENDER */}
        <div style={{marginBottom:26}}>
          <div style={{fontSize:'1rem',fontWeight:700,color:T.navy,marginBottom:12,textTransform:'uppercase',letterSpacing:0.8}}>
            Gender
          </div>
          <div style={{display:'flex',gap:14}} role="group" aria-label="Gender">
            {[{v:'female',l:'Female',e:'👩'},{v:'male',l:'Male',e:'👨'}].map(opt=>(
              <button key={opt.v} type="button"
                aria-pressed={gender===opt.v}
                onClick={()=>{setGender(opt.v);setErrors(ev=>({...ev,gender:''}));}}
                style={{
                  flex:1, minHeight:72, padding:'14px 8px',
                  border:`2.5px solid ${errors.gender&&!gender?T.error:gender===opt.v?T.teal:T.border}`,
                  borderRadius:14, background:gender===opt.v?T.tealL:'#fff',
                  display:'flex',flexDirection:'column',alignItems:'center',gap:6,
                  cursor:'pointer', color:gender===opt.v?T.teal:T.textM,
                  transition:'all 0.15s', fontFamily:'Nunito,sans-serif',
                }}>
                <span style={{fontSize:'2rem'}} aria-hidden="true">{opt.e}</span>
                <span style={{fontSize:'1.05rem',fontWeight:700}}>{opt.l}</span>
              </button>
            ))}
          </div>
          {errors.gender&&<div role="alert" style={{marginTop:8,fontSize:'1rem',color:T.error,fontWeight:600,display:'flex',gap:6}}><span aria-hidden="true">⚠️</span>{errors.gender}</div>}
        </div>

        {/* AGE */}
        <div style={{marginBottom:32}}>
          <div style={{fontSize:'1rem',fontWeight:700,color:T.navy,marginBottom:12,textTransform:'uppercase',letterSpacing:0.8}}>
            Age group
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:14}}
               role="group" aria-label="Age group">
            {AGE_GROUPS.map(ag=>(
              <button key={ag.label} type="button"
                aria-pressed={ageGroup===ag.label&&!ageCustom}
                onClick={()=>{setAgeGroup(ag.label);setAgeCustom('');setErrors(ev=>({...ev,age:''}));}}
                style={{
                  minHeight:56, padding:'12px 6px',
                  border:`2.5px solid ${errors.age&&!finalAge?T.error:ageGroup===ag.label&&!ageCustom?T.teal:T.border}`,
                  borderRadius:12, background:ageGroup===ag.label&&!ageCustom?T.tealL:'#fff',
                  fontSize:'1.1rem',fontWeight:700,
                  color:ageGroup===ag.label&&!ageCustom?T.teal:T.textM,
                  cursor:'pointer', transition:'all 0.15s',fontFamily:'Nunito,sans-serif',
                }}>
                {ag.label}
              </button>
            ))}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <span style={{fontSize:'1rem',color:T.textS,whiteSpace:'nowrap',fontWeight:600}}>Exact age:</span>
            <input type="number" placeholder="e.g. 68" min="18" max="120"
              value={ageCustom}
              aria-label="Enter exact age"
              onChange={e=>{setAgeCustom(e.target.value);if(e.target.value)setAgeGroup('');setErrors(ev=>({...ev,age:''}));}}
              style={{
                flex:1, padding:'14px 16px',
                border:`2.5px solid ${ageCustom?T.teal:T.border}`,
                borderRadius:12, fontSize:'1.2rem', color:T.text, outline:'none',
                textAlign:'center', fontFamily:'Atkinson Hyperlegible,sans-serif',
              }}
            />
          </div>
          {errors.age&&<div role="alert" style={{marginTop:8,fontSize:'1rem',color:T.error,fontWeight:600,display:'flex',gap:6}}><span aria-hidden="true">⚠️</span>{errors.age}</div>}
        </div>

        <PrimaryBtn icon="→" onClick={()=>{if(validate())setStep(2);}}>Continue</PrimaryBtn>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────────
   GAME 1: SHOPPING LIST (Working Memory)
   Clinical: Cicerone et al. 2019 — Practice Standard
───────────────────────────────────────────────────────────────── */
const ITEMS=[
  {id:'milk',   l:'Milk',        e:'🥛'},{id:'bread',  l:'Bread',       e:'🍞'},
  {id:'eggs',   l:'Eggs',        e:'🥚'},{id:'butter', l:'Butter',      e:'🧈'},
  {id:'apples', l:'Apples',      e:'🍎'},{id:'tomato', l:'Tomatoes',    e:'🍅'},
  {id:'cheese', l:'Cheese',      e:'🧀'},{id:'chicken',l:'Chicken',     e:'🍗'},
  {id:'carrots',l:'Carrots',     e:'🥕'},{id:'potato', l:'Potatoes',    e:'🥔'},
  {id:'onions', l:'Onions',      e:'🧅'},{id:'yogurt', l:'Yogurt',      e:'🫙'},
  {id:'coffee', l:'Coffee',      e:'☕'},{id:'tea',    l:'Tea',         e:'🍵'},
  {id:'sugar',  l:'Sugar',       e:'🍬'},{id:'flour',  l:'Flour',       e:'🌾'},
  {id:'rice',   l:'Rice',        e:'🍚'},{id:'pasta',  l:'Pasta',       e:'🍝'},
  {id:'fish',   l:'Fish',        e:'🐟'},{id:'lemons', l:'Lemons',      e:'🍋'},
  {id:'berry',  l:'Strawberries',e:'🍓'},{id:'banana', l:'Bananas',     e:'🍌'},
  {id:'orange', l:'Oranges',     e:'🍊'},{id:'grapes', l:'Grapes',      e:'🍇'},
];
const SL_LEVELS=[
  {n:1,items:4,secs:10,label:'Warm-up'},
  {n:2,items:5,secs:12,label:'Easy'},
  {n:3,items:6,secs:14,label:'Moderate'},
  {n:4,items:7,secs:16,label:'Challenging'},
  {n:5,items:8,secs:18,label:'Expert'},
];

function ShoppingList({player,onBack}){
  const [phase,setPhase]=useState('intro');
  const [lvl,setLvl]=useState(0);
  const [round,setRound]=useState(1);
  const [target,setTarget]=useState([]);
  const [pool,setPool]=useState([]);
  const [sel,setSel]=useState([]);
  const [t,setT]=useState(0);
  const [score,setScore]=useState({c:0,tot:0});
  const [rounds,setRounds]=useState([]);
  const timer=useRef(null);
  const TOTAL=3;
  const cfg=SL_LEVELS[Math.min(lvl,SL_LEVELS.length-1)];

  const startRound=useCallback(()=>{
    const its=shuffle(ITEMS).slice(0,cfg.items);
    const dist=shuffle(ITEMS.filter(p=>!its.find(i=>i.id===p.id))).slice(0,cfg.items);
    setTarget(its);setPool(shuffle([...its,...dist]));setSel([]);setT(cfg.secs);setPhase('memorise');
  },[cfg]);

  useEffect(()=>{
    if(phase!=='memorise') return;
    timer.current=setInterval(()=>setT(prev=>{
      if(prev<=1){clearInterval(timer.current);setPhase('recall');return 0;}
      return prev-1;
    }),1000);
    return()=>clearInterval(timer.current);
  },[phase]);

  function toggle(item){
    setSel(p=>p.find(s=>s.id===item.id)?p.filter(s=>s.id!==item.id):p.length<cfg.items?[...p,item]:p);
  }

  function submit(){
    const c=sel.filter(s=>target.find(t=>t.id===s.id)).length;
    setScore(sc=>({c:sc.c+c,tot:sc.tot+cfg.items}));
    setRounds(p=>[...p,{round,target,sel:[...sel],c,tot:cfg.items}]);
    setPhase('result');
  }

  function next(){
    if(round>=TOTAL){setPhase('complete');return;}
    const last=rounds[rounds.length-1];
    if(last&&last.c===last.tot) setLvl(l=>Math.min(l+1,SL_LEVELS.length-1));
    setRound(r=>r+1);startRound();
  }

  if(phase==='intro') return(
    <Screen player={player} title="Shopping List" subtitle="Working Memory" onBack={onBack} headerColor={T.teal}>
      <Card accent={T.teal}>
        <div style={{padding:'28px 24px'}}>
          <div style={{fontSize:'4rem',textAlign:'center',marginBottom:12}} aria-hidden="true">🛒</div>
          <h2 style={{fontFamily:'Nunito,sans-serif',fontWeight:800,fontSize:'1.8rem',color:T.navy,textAlign:'center',marginBottom:10}}>Shopping List</h2>
          <div style={{background:T.tealL,borderRadius:100,padding:'6px 18px',textAlign:'center',color:T.teal,fontWeight:700,fontSize:'0.9rem',display:'inline-block',margin:'0 auto 18px',letterSpacing:1,textTransform:'uppercase',width:'100%'}}>Working Memory</div>

          {/* How to play — clear step-by-step */}
          <div style={{background:T.bg,borderRadius:14,padding:'18px 20px',marginBottom:22}}>
            <div style={{fontWeight:700,color:T.navy,fontSize:'1.05rem',marginBottom:14}}>How to play:</div>
            {[
              ['📋','A shopping list appears on screen'],
              ['👀',`Study it carefully for ${cfg.secs} seconds`],
              ['🙈','The list disappears automatically'],
              ['☑️','Tap all the items you remember'],
            ].map(([e,t])=>(
              <div key={t} style={{display:'flex',gap:14,alignItems:'center',marginBottom:12}}>
                <div style={{width:44,height:44,borderRadius:12,background:T.tealL,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.4rem',flexShrink:0}} aria-hidden="true">{e}</div>
                <span style={{fontSize:'1.05rem',color:T.textM,fontWeight:600}}>{t}</span>
              </div>
            ))}
          </div>

          <div style={{background:T.tealL,borderRadius:12,padding:'12px 16px',marginBottom:22,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontWeight:600,color:T.teal,fontSize:'1rem'}}>Level {cfg.n} · {cfg.label}</span>
            <span style={{fontWeight:700,color:T.navy,fontSize:'1.1rem'}}>{cfg.items} items · {cfg.secs}s</span>
          </div>

          <PrimaryBtn color={T.teal} icon="▶" onClick={startRound}>
            Start round 1 of {TOTAL}
          </PrimaryBtn>

          <p style={{textAlign:'center',fontSize:'0.82rem',color:T.textS,marginTop:14}}>
            📌 Cicerone et al. 2019 — Episodic memory training, Practice Standard
          </p>
        </div>
      </Card>
    </Screen>
  );

  if(phase==='memorise') return(
    <Screen player={player} title={`Round ${round}/${TOTAL} — Study`} onBack={onBack} headerColor={T.teal}>
      <Card>
        <div style={{padding:'22px 20px'}}>
          {/* Timer */}
          <div style={{marginBottom:16}}>
            <TimerBar fraction={t/cfg.secs} label={`${t} seconds left`}/>
          </div>

          <h2 style={{fontFamily:'Nunito,sans-serif',fontWeight:800,fontSize:'1.5rem',color:T.navy,textAlign:'center',marginBottom:20}}>
            Remember these {cfg.items} items:
          </h2>

          {/* Item grid — large tiles */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:12}}>
            {target.map((item,i)=>(
              <div key={item.id} style={{
                background:T.tealL,borderRadius:16,padding:'18px 10px',
                display:'flex',flexDirection:'column',alignItems:'center',gap:8,
                border:`2px solid ${T.teal}`,
                animation:`fadeUp 0.4s ease ${i*60}ms both`,
              }}>
                <span style={{fontSize:'2.4rem'}} aria-hidden="true">{item.e}</span>
                <span style={{fontSize:'1.05rem',fontWeight:700,color:T.navy,textAlign:'center'}}>{item.l}</span>
              </div>
            ))}
          </div>

          <p style={{textAlign:'center',color:T.textS,fontSize:'1rem',marginTop:18,fontWeight:600}}>
            The list will hide automatically when the timer ends.
          </p>
        </div>
      </Card>
    </Screen>
  );

  if(phase==='recall') return(
    <Screen player={player} title={`Round ${round}/${TOTAL} — Recall`} onBack={onBack} headerColor={T.teal}>
      <Card>
        <div style={{padding:'22px 20px'}}>
          <h2 style={{fontFamily:'Nunito,sans-serif',fontWeight:800,fontSize:'1.5rem',color:T.navy,textAlign:'center',marginBottom:8}}>
            Which items were on the list?
          </h2>
          {/* Large clear counter */}
          <div style={{textAlign:'center',marginBottom:20}}>
            <div style={{display:'inline-flex',alignItems:'center',gap:8,background:T.bg,borderRadius:100,padding:'8px 22px'}}>
              <span style={{fontSize:'1rem',color:T.textS,fontWeight:600}}>Selected:</span>
              <span style={{fontSize:'1.3rem',fontWeight:800,color:T.teal,fontFamily:'Nunito,sans-serif'}}>{sel.length} / {cfg.items}</span>
            </div>
          </div>

          {/* Recall grid — large tap targets */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:10,marginBottom:22}}>
            {pool.map(item=>{
              const s=!!sel.find(x=>x.id===item.id);
              return(
                <button key={item.id}
                  aria-pressed={s}
                  aria-label={`${item.l}${s?' — selected':''}`}
                  onClick={()=>toggle(item)}
                  style={{
                    minHeight:96,
                    background:s?T.tealL:'#fff',
                    border:`3px solid ${s?T.teal:T.border}`,
                    borderRadius:16, padding:'14px 8px',
                    display:'flex',flexDirection:'column',alignItems:'center',gap:7,
                    cursor:'pointer', position:'relative', transition:'all 0.15s',
                    fontFamily:'inherit',
                  }}>
                  <span style={{fontSize:'2.2rem'}} aria-hidden="true">{item.e}</span>
                  <span style={{fontSize:'0.95rem',fontWeight:700,color:T.navy,textAlign:'center'}}>{item.l}</span>
                  {s&&<div style={{position:'absolute',top:6,right:8,width:24,height:24,borderRadius:'50%',background:T.teal,display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <span style={{color:'#fff',fontSize:'0.8rem',fontWeight:800}}>✓</span>
                  </div>}
                </button>
              );
            })}
          </div>

          <PrimaryBtn color={T.teal} icon="✓" onClick={submit} disabled={sel.length===0}>
            Submit my answers
          </PrimaryBtn>
        </div>
      </Card>
    </Screen>
  );

  if(phase==='result'){
    const last=rounds[rounds.length-1];
    return(
      <Screen player={player} title={`Round ${round} — Result`} onBack={onBack} headerColor={T.teal}>
        <Card>
          <div style={{padding:'28px 22px'}}>
            <ResultHeader correct={last.c} total={last.tot}/>

            {/* Item review */}
            <div style={{marginBottom:24}}>
              <div style={{fontWeight:700,color:T.navy,fontSize:'1.05rem',marginBottom:12}}>Your answers:</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(100px,1fr))',gap:8}}>
                {last.target.map(item=>{
                  const was=!!last.sel.find(s=>s.id===item.id);
                  return(
                    <div key={item.id} style={{
                      borderRadius:14,border:`3px solid ${was?T.success:T.error}`,
                      padding:'12px 6px',display:'flex',flexDirection:'column',alignItems:'center',gap:5,
                      background:was?T.successL:T.errorL,
                    }}>
                      <span style={{fontSize:'2rem'}} aria-hidden="true">{item.e}</span>
                      <span style={{fontSize:'0.88rem',fontWeight:700,color:T.text,textAlign:'center'}}>{item.l}</span>
                      <span style={{fontSize:'1.2rem'}} aria-label={was?'Correct':'Missed'}>{was?'✅':'❌'}</span>
                    </div>
                  );
                })}
              </div>
            </div>

            {round>=TOTAL&&<CognitiveAge player={player}/>}

            <PrimaryBtn color={T.teal} icon="→" onClick={next}>
              {round>=TOTAL?'See final results':'Round '+(round+1)}
            </PrimaryBtn>
          </div>
        </Card>
      </Screen>
    );
  }

  if(phase==='complete'){
    const tp=Math.round((score.c/score.tot)*100);
    const stars=tp>=90?3:tp>=65?2:1;
    return(
      <Screen player={player} title="Session Complete" onBack={onBack} headerColor={T.teal}>
        <Card>
          <div style={{padding:'28px 22px'}}>
            <div style={{textAlign:'center',marginBottom:20}}>
              <div style={{fontSize:'2.2rem',marginBottom:8}} aria-label={`${stars} stars`}>
                {'⭐'.repeat(stars)}{'☆'.repeat(3-stars)}
              </div>
              <h2 style={{fontFamily:'Nunito,sans-serif',fontWeight:800,fontSize:'1.9rem',color:T.navy,marginBottom:6}}>
                Great work, {player.name}!
              </h2>
              <p style={{fontSize:'1.1rem',color:T.textM}}>Shopping List session complete.</p>
            </div>

            {/* Stats */}
            <div style={{display:'flex',gap:12,justifyContent:'center',marginBottom:22}}>
              {[['Recalled',score.c,T.navy],['Total',score.tot,T.navy],['Accuracy',`${tp}%`,T.teal]].map(([l,v,c])=>(

                </div>
              ))}
